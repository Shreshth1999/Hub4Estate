version: 1
frontend:
  phases:
    install:
      commands:
        - source ~/.nvm/nvm.sh
        - nvm install 20
        - nvm use 20
        - node --version
        - npm install --ignore-scripts
    build:
      commands:
        - cd frontend && npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
