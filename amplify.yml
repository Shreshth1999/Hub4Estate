version: 1
frontend:
  phases:
    install:
      commands:
        - nvm install 20
        - nvm use 20
        - cd frontend && npm install --ignore-scripts
    build:
      commands:
        - cd frontend && npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
