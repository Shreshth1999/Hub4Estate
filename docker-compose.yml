version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hub4estate-db
    environment:
      POSTGRES_USER: hub4estate
      POSTGRES_PASSWORD: hub4estate_dev_password
      POSTGRES_DB: hub4estate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub4estate"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hub4estate-redis
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: hub4estate-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hub4estate-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hub4estate
      MINIO_ROOT_PASSWORD: hub4estate_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hub4estate-backend
    environment:
      DATABASE_URL: postgresql://hub4estate:hub4estate_dev_password@postgres:5432/hub4estate?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
      AWS_S3_BUCKET: hub4estate-uploads
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hub4estate-frontend
    environment:
      VITE_BACKEND_API_URL: http://localhost:3001/api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  es_data:
  minio_data:
