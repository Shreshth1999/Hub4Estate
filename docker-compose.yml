version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: hub4estate-db
    environment:
      POSTGRES_USER: hub4estate
      POSTGRES_PASSWORD: hub4estate_dev_password
      POSTGRES_DB: hub4estate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub4estate"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hub4estate-backend
    environment:
      DATABASE_URL: postgresql://hub4estate:hub4estate_dev_password@postgres:5432/hub4estate?schema=public
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hub4estate-frontend
    environment:
      VITE_BACKEND_API_URL: http://localhost:3001/api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
