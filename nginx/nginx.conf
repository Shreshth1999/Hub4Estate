# Hub4Estate Production Nginx Configuration
# Place at: /etc/nginx/sites-available/hub4estate
# Enable: ln -s /etc/nginx/sites-available/hub4estate /etc/nginx/sites-enabled/

# ── RATE LIMIT ZONES ──────────────────────────────────────────────────────────
# Shared memory zones (declared in http block)
limit_req_zone $binary_remote_addr zone=global:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=otp:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=20r/m;

# ── GEO BLOCKING (optional) ───────────────────────────────────────────────────
# geo $block_ip {
#   default 0;
#   1.2.3.4/32 1;   # Add known bad IPs
# }

# ── CONNECTION LIMITS ─────────────────────────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ── UPSTREAM: BACKEND NODE ────────────────────────────────────────────────────
upstream hub4estate_api {
    server 127.0.0.1:3001;
    keepalive 64;
}

# ── UPSTREAM: FRONTEND (if SSR or separate process) ───────────────────────────
upstream hub4estate_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP → HTTPS REDIRECT ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hub4estate.com www.hub4estate.com api.hub4estate.com;

    # Allow Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── API SERVER ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.hub4estate.com;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.hub4estate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hub4estate.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.hub4estate.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── SECURITY HEADERS ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(self), microphone=()" always;

    # Remove fingerprinting headers
    server_tokens off;
    more_clear_headers Server;
    more_clear_headers X-Powered-By;

    # ── CONNECTION LIMITS ─────────────────────────────────────────────────────
    limit_conn addr 20;
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 15s;
    send_timeout 30s;
    keepalive_timeout 65s;

    # ── BLOCK COMMON ATTACK PATTERNS ─────────────────────────────────────────
    # Block SQL injection attempts in query strings
    if ($query_string ~* "(\bunion\b.*\bselect\b|\bselect\b.*\bfrom\b|\bdrop\b.*\btable\b)") {
        return 403;
    }

    # Block path traversal
    if ($request_uri ~* "\.\./") {
        return 403;
    }

    # Block common scanners / bots
    if ($http_user_agent ~* "(sqlmap|nikto|nessus|openvas|masscan|zgrab|dirbuster|gobuster|wfuzz)") {
        return 403;
    }

    # ── AUTH ROUTES (strict rate limiting) ───────────────────────────────────
    location /api/auth/send-otp {
        limit_req zone=otp burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://hub4estate_api;
        include /etc/nginx/proxy_params;
    }

    location /api/auth/verify-otp {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://hub4estate_api;
        include /etc/nginx/proxy_params;
    }

    location /api/auth/dealer/login {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://hub4estate_api;
        include /etc/nginx/proxy_params;
    }

    location /api/auth/forgot-password {
        limit_req zone=otp burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://hub4estate_api;
        include /etc/nginx/proxy_params;
    }

    # ── UPLOAD ROUTES ─────────────────────────────────────────────────────────
    location /api/inquiry/submit {
        limit_req zone=upload burst=5 nodelay;
        limit_req_status 429;
        client_max_body_size 10M;
        proxy_pass http://hub4estate_api;
        include /etc/nginx/proxy_params;
    }

    location /api/slip-scanner {
        limit_req zone=upload burst=5 nodelay;
        limit_req_status 429;
        client_max_body_size 10M;
        proxy_pass http://hub4estate_api;
        include /etc/nginx/proxy_params;
    }

    # ── GENERAL API ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://hub4estate_api;
        include /etc/nginx/proxy_params;
    }

    # ── HEALTH CHECK (no rate limit) ──────────────────────────────────────────
    location /api/health {
        proxy_pass http://hub4estate_api;
        access_log off;
        include /etc/nginx/proxy_params;
    }

    # ── BLOCK HIDDEN FILES ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── BLOCK COMMON EXPLOIT TARGETS ─────────────────────────────────────────
    location ~* \.(env|git|sql|bak|log|conf|config|yml|yaml|json|lock)$ {
        deny all;
        return 404;
    }

    location ~* /(phpMyAdmin|phpmyadmin|wp-admin|wp-login|xmlrpc|\.git) {
        deny all;
        return 404;
    }
}

# ── FRONTEND (web app) ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hub4estate.com www.hub4estate.com;

    ssl_certificate     /etc/letsencrypt/live/hub4estate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hub4estate.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hub4estate.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.hub4estate.com; frame-ancestors 'none';" always;

    server_tokens off;

    limit_conn addr 20;
    client_max_body_size 5M;
    keepalive_timeout 65s;

    # Redirect www → non-www
    if ($host = "www.hub4estate.com") {
        return 301 https://hub4estate.com$request_uri;
    }

    root /var/www/hub4estate/frontend/dist;
    index index.html;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback
    location / {
        limit_req zone=global burst=30 nodelay;
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
